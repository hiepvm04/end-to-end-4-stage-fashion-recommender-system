name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint với Ruff
  # ─────────────────────────────────────────────
  lint:
    name: 🔍 Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run Ruff linter
        run: uv run ruff check .

      - name: Run Ruff formatter check
        run: uv run ruff format --check .

  # ─────────────────────────────────────────────
  # Job 2: Unit Tests
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint  # Chỉ chạy test nếu lint đã pass

    # Biến môi trường cho test – không dùng API key thật
    env:
      HOPSWORKS_API_KEY: ""
      OPENAI_API_KEY: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install all dependencies (including dev)
        run: uv sync --all-groups

      - name: Run pytest
        run: |
          uv run pytest tests/ \
            --verbose \
            --tb=short \
            --no-header \
            -p no:warnings

      - name: Upload test report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: .pytest_cache/
          retention-days: 7
